name: Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: "https://vydawdpzfpmwqmvymwsi.supabase.co"
      SUPABASE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5ZGF3ZHB6ZnBtd3Ftdnltd3NpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MjYzNDYsImV4cCI6MjA5MDAwMjM0Nn0.WEE-sHB5woplMM3URHIs3cX0mUV_MdvETsU-_v40XQs"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "tag=$(cat version.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Check tag exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "${{ steps.version.outputs.tag }}" | grep -q "${{ steps.version.outputs.tag }}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Go
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: go mod tidy
        if: steps.tag_check.outputs.exists == 'false'
        run: go mod tidy

      - name: Build Windows (amd64)
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          LDFLAGS="-s -w -X main.supabaseURL=$SUPABASE_URL -X main.supabaseAnonKey=$SUPABASE_KEY"
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o gg-tracker.exe .

      - name: Build macOS Apple Silicon (darwin/arm64)
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          LDFLAGS="-s -w -X main.supabaseURL=$SUPABASE_URL -X main.supabaseAnonKey=$SUPABASE_KEY"
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o gg-tracker .

      - name: Build macOS Intel (darwin/amd64)
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          LDFLAGS="-s -w -X main.supabaseURL=$SUPABASE_URL -X main.supabaseAnonKey=$SUPABASE_KEY"
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o gg-tracker-intel .

      - name: Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            gg-tracker.exe
            gg-tracker
            gg-tracker-intel
