name: 📣 Notify PR to .github repo

on:
  pull_request:
    types:
      - opened
      - closed
      - reopened
      - edited
      - labeled
      - unlabeled
      - synchronize

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_PR_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo:  '.github',
              event_type: 'pr-updated',
            });
