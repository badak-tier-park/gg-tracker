<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GG Tracker - 초기 설정</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif;
         display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px;
          padding: 40px; width: 520px; }
  h1 { font-size: 22px; margin-bottom: 8px; color: #58a6ff; }
  .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 28px; }
  .field { margin-bottom: 20px; }
  label { display: block; font-size: 14px; color: #cdd5de; margin-bottom: 6px; font-weight: 600; }
  input[type=text] { width: 100%; background: #0d1117; border: 1px solid #30363d;
                     border-radius: 6px; padding: 10px 14px; color: #e6edf3;
                     font-size: 13px; outline: none; }
  input[type=text]:focus { border-color: #58a6ff; }
  .hint { color: #8b949e; font-size: 12px; margin-top: 6px; line-height: 1.5; }
  .hint code { background: #1c2128; padding: 1px 5px; border-radius: 3px; font-size: 11px; color: #a5d6ff; }
  .divider { border: none; border-top: 1px solid #21262d; margin: 24px 0; }
  button { width: 100%; background: #238636; border: none; border-radius: 6px;
           padding: 12px; color: #fff; font-size: 15px; cursor: pointer; margin-top: 8px; }
  button:hover { background: #2ea043; }
  .error { background: #2d1a1a; border: 1px solid #f85149; border-radius: 6px;
           padding: 12px 16px; margin-bottom: 20px; font-size: 13px; color: #f85149; }
</style>
</head>
<body>
<div class="card">
  <h1>⚙ GG Tracker 설정</h1>
  <p class="subtitle">리플레이 저장 경로를 확인해주세요</p>
  {{if .Error}}
  <div class="error">⚠ {{.Error}}</div>
  {{end}}
  <form method="POST" action="/setup">
    <div class="field">
      <label>📁 리플레이 저장 경로</label>
      <input type="text" name="replay_path" value="{{.ReplayPath}}" required
             placeholder="예: C:\Users\홍길동\Documents\StarCraft\maps\replays">
      <p class="hint">스타크래프트 실행 → 옵션 → 게임 → 리플레이 저장 폴더에서 확인</p>
    </div>
    <button type="submit">✓ 저장하고 시작하기</button>
  </form>
</div>
</body>
</html>
